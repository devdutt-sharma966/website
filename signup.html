<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Devdut Sharma</title>
<style>
:root {
  --primary: #000000;
  --secondary: #FFFFFF;
  --accent: #FF5E5B;
  --shadow: 8px 8px 0px var(--primary);
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Courier New', monospace;
}
body {
  background-color: var(--secondary);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.login-container {
  width: 100%;
  max-width: 400px;
  border: 1px solid var(--primary);
  padding: 40px 30px;
  background-color: var(--secondary);
  box-shadow: var(--shadow);
  position: relative;
  border-radius: 12px;
}
.login-container::before {
  content: '';
  position: absolute;
  top: 6px;
  left: 6px;
  right: -6px;
  bottom: -6px;
  border: 1px solid var(--primary);
  z-index: -1;
  border-radius: 12px;
}
h1 {
  color: var(--primary);
  margin-bottom: 30px;
  font-size: 28px;
  font-weight: 700;
  text-align: center;
}
.input-group {
  margin-bottom: 20px;
  position: relative;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
  color: var(--primary);
}
input {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid var(--primary);
  background-color: var(--secondary);
  font-size: 16px;
  outline: none;
  transition: all 0.3s;
}
input:focus {
  box-shadow: 4px 4px 0px var(--primary);
}
input:disabled{
  opacity:.5;
}
button {
  width: 100%;
  padding: 12px;
  background-color: var(--accent);
  color: var(--secondary);
  border: 2px solid var(--primary);
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.3s;
}
button:hover {
  box-shadow: 4px 4px 0px var(--primary);
  transform: translate(-2px, -2px);
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}
.divider {
  display: flex;
  align-items: center;
  margin: 25px 0;
  color: var(--primary);
  font-weight: bold;
}
.divider::before, .divider::after {
  content: "";
  flex: 1;
  border-bottom: 2px solid var(--primary);
  margin: 0 10px;
}
.social-login {
  display: flex;
  justify-content: center;
  gap: 15px;
}
.social-btn {
  width: 50px;
  height: 50px;
  border: 2px solid var(--primary);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: all 0.3s;
  font-weight:bold;
  background-color: var(--secondary);
}
.social-btn:hover {
  box-shadow: 4px 4px 0px var(--primary);
  transform: translate(-2px, -2px);
}
.footer {
  text-align: center;
  margin-top: 20px;
  color: var(--primary);
}
.footer a {
  color: var(--primary);
  font-weight: bold;
  text-decoration: underline;
}
.message{
  text-align:center;
  font-size:13px;
  font-weight:bold;
  padding:10px;
  border:2px solid var(--primary);
  margin-bottom:20px;
  display:none;
}
.message.error{
  background:var(--accent);
  color:var(--secondary);
  display:block;
}
.message.success{
  background:#000;
  color:#fff;
  display:block;
}
.hint{
  font-size:11px;
  color:#555;
  margin-top:6px;
}
</style>
</head>
<body>

<div class="login-container">
    <h1>SIGN UP</h1>

    <div class="message" id="formMessage"></div>

    <form id="signupForm" novalidate>
        <div class="input-group">
            <label for="name">NAME</label>
            <input type="text" id="name" placeholder="Your name" required autocomplete="name">
        </div>

        <div class="input-group">
            <label for="email">EMAIL</label>
            <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
        </div>

        <div class="input-group">
            <label for="password">PASSWORD</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
            <div class="hint">At least 6 characters.</div>
        </div>

        <div class="input-group">
            <label for="confirmPassword">CONFIRM PASSWORD</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
        </div>

        <button type="submit" id="submitBtn">CREATE ACCOUNT</button>
    </form>

    <div class="divider">OR</div>

    <div class="social-login">
        <div class="social-btn" data-provider="google" title="Continue with Google">G</div>
        <div class="social-btn" data-provider="facebook" title="Continue with Facebook">F</div>
        <div class="social-btn" data-provider="twitter" title="Continue with X">X</div>
    </div>

    <div class="footer">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCSy39eeFdJONcPSFJ76BJaciS1l6ESvTE",
    authDomain: "zynexalpha.firebaseapp.com",
    projectId: "zynexalpha",
    storageBucket: "zynexalpha.firebasestorage.app",
    messagingSenderId: "780065160785",
    appId: "1:780065160785:web:b168affe481f55d7154270",
    measurementId: "G-H70X75N1RF"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  const REDIRECT_TO = 'index.html';

  const form = document.getElementById('signupForm');
  const nameInput = document.getElementById('name');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirmPassword');
  const submitBtn = document.getElementById('submitBtn');
  const messageBox = document.getElementById('formMessage');

  function showMessage(text, type){
    messageBox.textContent = text;
    messageBox.className = 'message ' + type;
  }
  function clearMessage(){
    messageBox.className = 'message';
    messageBox.textContent = '';
  }
  function friendlyError(err){
    const map = {
      'auth/email-already-in-use': 'An account already exists with that email.',
      'auth/invalid-email': 'That email address looks invalid.',
      'auth/weak-password': 'Password should be at least 6 characters.',
      'auth/popup-closed-by-user': 'Sign-in popup closed before completing.',
      'auth/account-exists-with-different-credential': 'An account already exists with a different sign-in method.'
    };
    return map[err.code] || err.message;
  }
  function setLoading(isLoading){
    submitBtn.disabled = isLoading;
    [nameInput, emailInput, passwordInput, confirmInput].forEach(i => i.disabled = isLoading);
    submitBtn.textContent = isLoading ? 'CREATING ACCOUNT...' : 'CREATE ACCOUNT';
  }

  auth.onAuthStateChanged(user => {
    if (user) window.location.href = REDIRECT_TO;
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    clearMessage();
    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    const confirmPassword = confirmInput.value;

    if (!name || !email || !password || !confirmPassword){
      showMessage('Please fill in every field.', 'error');
      return;
    }
    if (password.length < 6){
      showMessage('Password should be at least 6 characters.', 'error');
      return;
    }
    if (password !== confirmPassword){
      showMessage('Passwords do not match.', 'error');
      return;
    }

    setLoading(true);
    auth.createUserWithEmailAndPassword(email, password)
      .then(cred => cred.user.updateProfile({ displayName: name }))
      .then(() => { window.location.href = REDIRECT_TO; })
      .catch(err => {
        setLoading(false);
        showMessage(friendlyError(err), 'error');
      });
  });

  const providers = {
    google: () => new firebase.auth.GoogleAuthProvider(),
    facebook: () => new firebase.auth.FacebookAuthProvider(),
    twitter: () => new firebase.auth.TwitterAuthProvider()
  };

  document.querySelectorAll('.social-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      clearMessage();
      const key = btn.dataset.provider;
      const provider = providers[key]();
      auth.signInWithPopup(provider)
        .then(() => { window.location.href = REDIRECT_TO; })
        .catch(err => showMessage(friendlyError(err), 'error'));
    });
  });
</script>
</body>
</html>
