<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Devdutt Sharma</title>
<style>
:root{
  --bg:#0B0B0D;
  --surface:#151517;
  --fg:#F5F5F0;
  --muted:#8A8A8E;
  --accent:#FF5E5B;
  --ok:#39FF88;
  --shadow: 6px 6px 0px var(--fg);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New', monospace;}
body{background:var(--bg);color:var(--fg);min-height:100vh;padding:0 0 80px;}
a{color:inherit;}

/* ===== Gate screens ===== */
.gate{
  min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;text-align:center;padding:30px;
}
.gate p{color:var(--muted);max-width:380px;}
.gate .btn{margin-top:10px;}

/* ===== Top bar ===== */
header{
  border-bottom:2px solid var(--fg);
  padding:22px 30px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.title-block h1{font-size:20px;letter-spacing:.06em;}
.title-block span{font-size:12px;color:var(--muted);}
.top-actions{display:flex;align-items:center;gap:12px;}
.pill{
  font-size:11px;padding:7px 14px;border:2px solid var(--fg);border-radius:100px;color:var(--muted);
}
.btn{
  font-family:'Courier New', monospace;
  font-weight:bold;
  font-size:13px;
  padding:10px 18px;
  border:2px solid var(--fg);
  background:var(--bg);
  color:var(--fg);
  cursor:pointer;
  transition:all .2s ease;
}
.btn:hover{box-shadow:4px 4px 0px var(--fg);transform:translate(-2px,-2px);}
.btn-accent{background:var(--accent);border-color:var(--fg);color:#0B0B0D;}
.btn-ok{background:var(--ok);border-color:var(--fg);color:#0B0B0D;}
.btn-ghost{background:transparent;}
.btn-danger{background:var(--bg);color:var(--accent);border-color:var(--accent);}
.btn-danger:hover{box-shadow:4px 4px 0px var(--accent);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

main{max-width:960px;margin:0 auto;padding:40px 24px;}
section{margin-bottom:60px;}
.section-title{
  font-size:16px;letter-spacing:.08em;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--fg);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
}

.message{font-size:12px;padding:10px 14px;border:2px solid var(--fg);margin-bottom:16px;display:none;}
.message.error{background:var(--accent);color:#0B0B0D;display:block;border-color:var(--fg);}
.message.success{background:var(--ok);color:#0B0B0D;display:block;border-color:var(--fg);}

/* ===== Project list ===== */
.project-row{
  border:2px solid var(--fg);
  padding:16px 18px;
  margin-bottom:12px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;
  background:var(--surface);
}
.project-row .info{flex:1;min-width:200px;}
.project-row h3{font-size:15px;margin-bottom:6px;}
.project-row .cat{font-size:10.5px;color:var(--accent);letter-spacing:.08em;margin-bottom:8px;display:block;}
.project-row p{font-size:12.5px;color:var(--muted);margin-bottom:8px;}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;}
.tag-row span{font-size:10px;border:1px solid var(--muted);color:var(--muted);padding:3px 8px;}
.row-actions{display:flex;gap:8px;flex-shrink:0;}
.row-actions .btn{padding:8px 12px;font-size:11px;}
.empty-note{color:var(--muted);font-size:13px;padding:20px 0;}

/* ===== Form ===== */
.form-card{
  border:2px solid var(--fg);
  background:var(--surface);
  padding:26px;
  margin-bottom:20px;
  display:none;
}
.form-card.open{display:block;}
.form-row{margin-bottom:16px;}
.form-row label{display:block;font-size:11px;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;}
.form-row input[type=text], .form-row input[type=url], .form-row textarea{
  width:100%;padding:11px 13px;border:2px solid var(--fg);background:var(--bg);color:var(--fg);font-size:14px;outline:none;
}
.form-row textarea{resize:vertical;min-height:70px;}
.form-row input:focus, .form-row textarea:focus{box-shadow:3px 3px 0px var(--fg);}
.form-check{display:flex;align-items:center;gap:8px;}
.form-check input{width:16px;height:16px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-actions{display:flex;gap:10px;margin-top:6px;}
@media (max-width:600px){.form-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- ===== Auth gate ===== -->
<div class="gate" id="gateChecking">
  <p>Checking access…</p>
</div>

<div class="gate" id="gateDenied" style="display:none;">
  <h1 style="font-size:22px;">ACCESS DENIED</h1>
  <p>This page is restricted to the site owner. Sign in with the authorized account to continue.</p>
  <a class="btn btn-accent" href="login.html?redirect=admin.html">Go to Login</a>
  <a class="btn btn-ghost" href="index.html">Back to site</a>
</div>

<!-- ===== Admin content ===== -->
<div id="adminApp" style="display:none;">

  <header>
    <div class="title-block">
      <h1>ADMIN PANEL</h1>
      <span id="adminEmail"></span>
    </div>
    <div class="top-actions">
      <a class="pill" href="index.html">← Site</a>
      <button class="btn btn-ghost" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main>

    <!-- ===== Projects ===== -->
    <section>
      <div class="section-title">
        <span>Projects</span>
        <button class="btn btn-accent" id="newProjectBtn">+ Add Project</button>
      </div>

      <div class="message" id="projectMessage"></div>

      <div class="form-card" id="projectForm">
        <input type="hidden" id="projectDocId">
        <div class="form-grid">
          <div class="form-row">
            <label>TITLE</label>
            <input type="text" id="pTitle" placeholder="Project name">
          </div>
          <div class="form-row">
            <label>CATEGORY</label>
            <input type="text" id="pCategory" placeholder="e.g. Machine Learning">
          </div>
        </div>
        <div class="form-row">
          <label>DESCRIPTION</label>
          <textarea id="pDescription" placeholder="One or two sentences about the project"></textarea>
        </div>
        <div class="form-row">
          <label>TAGS (comma separated)</label>
          <input type="text" id="pTags" placeholder="Python, PyTorch, CNN">
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>GITHUB URL</label>
            <input type="url" id="pGithub" placeholder="https://github.com/...">
          </div>
          <div class="form-row">
            <label>LIVE DEMO URL</label>
            <input type="url" id="pDemo" placeholder="https://...">
          </div>
        </div>
        <div class="form-row form-check">
          <input type="checkbox" id="pFeatured">
          <label for="pFeatured" style="margin:0;">Mark as featured</label>
        </div>
        <div class="form-actions">
          <button class="btn btn-ok" id="saveProjectBtn">Save Project</button>
          <button class="btn btn-ghost" id="cancelProjectBtn">Cancel</button>
        </div>
      </div>

      <div id="projectsList"></div>
    </section>

    <!-- ===== About ===== -->
    <section>
      <div class="section-title"><span>About</span></div>
      <div class="message" id="aboutMessage"></div>
      <div class="form-card open">
        <div class="form-row">
          <label>PARAGRAPH 1</label>
          <textarea id="aP1" placeholder="First paragraph of your About section"></textarea>
        </div>
        <div class="form-row">
          <label>PARAGRAPH 2</label>
          <textarea id="aP2" placeholder="Second paragraph"></textarea>
        </div>
        <div class="form-row">
          <label>STAT 1</label>
          <div class="form-grid">
            <input type="text" id="aStatValue0" placeholder="Value e.g. CSE">
            <input type="text" id="aStatLabel0" placeholder="Label e.g. AI & ML BRANCH">
          </div>
        </div>
        <div class="form-row">
          <label>STAT 2</label>
          <div class="form-grid">
            <input type="text" id="aStatValue1" placeholder="Value e.g. MIT">
            <input type="text" id="aStatLabel1" placeholder="Label e.g. MANIPAL">
          </div>
        </div>
        <div class="form-row">
          <label>STAT 3</label>
          <div class="form-grid">
            <input type="text" id="aStatValue2" placeholder="Value e.g. ML">
            <input type="text" id="aStatLabel2" placeholder="Label e.g. CORE FOCUS">
          </div>
        </div>
        <div class="form-row">
          <label>STAT 4</label>
          <div class="form-grid">
            <input type="text" id="aStatValue3" placeholder="Value e.g. ∞">
            <input type="text" id="aStatLabel3" placeholder="Label e.g. CURIOSITY">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-ok" id="saveAboutBtn">Save About</button>
        </div>
      </div>
    </section>

    <!-- ===== Skills ===== -->
    <section>
      <div class="section-title">
        <span>Skills</span>
        <button class="btn btn-accent" id="addSkillCatBtn">+ Add Category</button>
      </div>
      <div class="message" id="skillsMessage"></div>
      <div id="skillsCategories"></div>
      <div class="form-actions" style="margin-top:6px;">
        <button class="btn btn-ok" id="saveSkillsBtn">Save Skills</button>
      </div>
    </section>

    <!-- ===== Experience ===== -->
    <section>
      <div class="section-title">
        <span>Experience</span>
        <button class="btn btn-accent" id="newExpBtn">+ Add Experience</button>
      </div>
      <div class="message" id="expMessage"></div>
      <div class="form-card" id="expForm">
        <input type="hidden" id="expDocId">
        <div class="form-grid">
          <div class="form-row">
            <label>META (e.g. 2023 - Present)</label>
            <input type="text" id="xMeta" placeholder="2023 - Present">
          </div>
          <div class="form-row">
            <label>TITLE</label>
            <input type="text" id="xTitle" placeholder="AI/ML Researcher">
          </div>
        </div>
        <div class="form-row">
          <label>DESCRIPTION</label>
          <textarea id="xDescription" placeholder="What you did in this role"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-ok" id="saveExpBtn">Save Experience</button>
          <button class="btn btn-ghost" id="cancelExpBtn">Cancel</button>
        </div>
      </div>
      <div id="expList"></div>
    </section>

    <!-- ===== Education ===== -->
    <section>
      <div class="section-title">
        <span>Education</span>
        <button class="btn btn-accent" id="newEduBtn">+ Add Education</button>
      </div>
      <div class="message" id="eduMessage"></div>
      <div class="form-card" id="eduForm">
        <input type="hidden" id="eduDocId">
        <div class="form-grid">
          <div class="form-row">
            <label>DEGREE / TITLE</label>
            <input type="text" id="eTitle" placeholder="B.Tech, Computer Science & Engineering — AI & ML">
          </div>
          <div class="form-row">
            <label>META (institution · status)</label>
            <input type="text" id="eMeta" placeholder="MANIPAL INSTITUTE OF TECHNOLOGY · CURRENT">
          </div>
        </div>
        <div class="form-row">
          <label>DESCRIPTION</label>
          <textarea id="eDescription" placeholder="Coursework, focus areas, achievements, etc."></textarea>
        </div>
        <div class="form-row">
          <label>DISPLAY ORDER (lower shows first — leave as 0 if you don't mind)</label>
          <input type="text" id="eOrder" placeholder="0">
        </div>
        <div class="form-actions">
          <button class="btn btn-ok" id="saveEduBtn">Save Education</button>
          <button class="btn btn-ghost" id="cancelEduBtn">Cancel</button>
        </div>
      </div>
      <div id="eduList"></div>
    </section>

  </main>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCSy39eeFdJONcPSFJ76BJaciS1l6ESvTE",
    authDomain: "zynexalpha.firebaseapp.com",
    projectId: "zynexalpha",
    storageBucket: "zynexalpha.firebasestorage.app",
    messagingSenderId: "780065160785",
    appId: "1:780065160785:web:b168affe481f55d7154270",
    measurementId: "G-H70X75N1RF"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const ADMIN_EMAIL = 'devdutts178@gmail.com';

  const gateChecking = document.getElementById('gateChecking');
  const gateDenied = document.getElementById('gateDenied');
  const adminApp = document.getElementById('adminApp');

  auth.onAuthStateChanged(user => {
    if (user && user.email === ADMIN_EMAIL){
      gateChecking.style.display = 'none';
      gateDenied.style.display = 'none';
      adminApp.style.display = 'block';
      document.getElementById('adminEmail').textContent = user.email;
      initProjects();
      initEducation();
      initAbout();
      initSkills();
      initExperience();
    } else {
      gateChecking.style.display = 'none';
      adminApp.style.display = 'none';
      gateDenied.style.display = 'flex';
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));

  function flash(elId, text, type){
    const el = document.getElementById(elId);
    el.textContent = text;
    el.className = 'message ' + type;
    setTimeout(() => { el.className = 'message'; el.textContent=''; }, 4000);
  }

  /* ================= PROJECTS ================= */
  const projectForm = document.getElementById('projectForm');
  const projectsList = document.getElementById('projectsList');

  function resetProjectForm(){
    document.getElementById('projectDocId').value = '';
    document.getElementById('pTitle').value = '';
    document.getElementById('pCategory').value = '';
    document.getElementById('pDescription').value = '';
    document.getElementById('pTags').value = '';
    document.getElementById('pGithub').value = '';
    document.getElementById('pDemo').value = '';
    document.getElementById('pFeatured').checked = false;
  }

  document.getElementById('newProjectBtn').addEventListener('click', () => {
    resetProjectForm();
    projectForm.classList.add('open');
    projectForm.scrollIntoView({ behavior:'smooth', block:'center' });
  });
  document.getElementById('cancelProjectBtn').addEventListener('click', () => {
    projectForm.classList.remove('open');
  });

  document.getElementById('saveProjectBtn').addEventListener('click', () => {
    const title = document.getElementById('pTitle').value.trim();
    const category = document.getElementById('pCategory').value.trim();
    const description = document.getElementById('pDescription').value.trim();
    const tags = document.getElementById('pTags').value.split(',').map(t => t.trim()).filter(Boolean);
    const github = document.getElementById('pGithub').value.trim();
    const demo = document.getElementById('pDemo').value.trim();
    const featured = document.getElementById('pFeatured').checked;
    const docId = document.getElementById('projectDocId').value;

    if (!title || !description){
      flash('projectMessage', 'Title and description are required.', 'error');
      return;
    }

    const data = { title, category, description, tags, github, demo, featured };

    const saveBtn = document.getElementById('saveProjectBtn');
    saveBtn.disabled = true;

    const promise = docId
      ? db.collection('projects').doc(docId).update(data)
      : db.collection('projects').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });

    promise
      .then(() => {
        flash('projectMessage', docId ? 'Project updated.' : 'Project added.', 'success');
        projectForm.classList.remove('open');
        resetProjectForm();
      })
      .catch(err => flash('projectMessage', err.message, 'error'))
      .finally(() => { saveBtn.disabled = false; });
  });

  function editProject(doc){
    const d = doc.data();
    document.getElementById('projectDocId').value = doc.id;
    document.getElementById('pTitle').value = d.title || '';
    document.getElementById('pCategory').value = d.category || '';
    document.getElementById('pDescription').value = d.description || '';
    document.getElementById('pTags').value = (d.tags || []).join(', ');
    document.getElementById('pGithub').value = d.github || '';
    document.getElementById('pDemo').value = d.demo || '';
    document.getElementById('pFeatured').checked = !!d.featured;
    projectForm.classList.add('open');
    projectForm.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  function deleteProject(id, title){
    if (!confirm(`Delete "${title}"? This can't be undone.`)) return;
    db.collection('projects').doc(id).delete()
      .then(() => flash('projectMessage', 'Project deleted.', 'success'))
      .catch(err => flash('projectMessage', err.message, 'error'));
  }

  function initProjects(){
    db.collection('projects').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
      if (snapshot.empty){
        projectsList.innerHTML = '<div class="empty-note">No projects yet. Add your first one above.</div>';
        return;
      }
      projectsList.innerHTML = '';
      snapshot.forEach(doc => {
        const d = doc.data();
        const row = document.createElement('div');
        row.className = 'project-row';
        row.innerHTML = `
          <div class="info">
            <span class="cat">${(d.category || 'Project')}${d.featured ? ' · FEATURED' : ''}</span>
            <h3>${d.title}</h3>
            <p>${d.description || ''}</p>
            <div class="tag-row">${(d.tags || []).map(t => `<span>${t}</span>`).join('')}</div>
          </div>
          <div class="row-actions">
            <button class="btn" data-action="edit">Edit</button>
            <button class="btn btn-danger" data-action="delete">Delete</button>
          </div>`;
        row.querySelector('[data-action="edit"]').addEventListener('click', () => editProject(doc));
        row.querySelector('[data-action="delete"]').addEventListener('click', () => deleteProject(doc.id, d.title));
        projectsList.appendChild(row);
      });
    }, err => {
      projectsList.innerHTML = `<div class="empty-note">Couldn't load projects: ${err.message}</div>`;
    });
  }

  /* ================= EDUCATION ================= */
  const eduForm = document.getElementById('eduForm');
  const eduList = document.getElementById('eduList');

  function resetEduForm(){
    document.getElementById('eduDocId').value = '';
    document.getElementById('eTitle').value = '';
    document.getElementById('eMeta').value = '';
    document.getElementById('eDescription').value = '';
    document.getElementById('eOrder').value = '0';
  }

  document.getElementById('newEduBtn').addEventListener('click', () => {
    resetEduForm();
    eduForm.classList.add('open');
    eduForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
  document.getElementById('cancelEduBtn').addEventListener('click', () => {
    eduForm.classList.remove('open');
  });

  document.getElementById('saveEduBtn').addEventListener('click', () => {
    const title = document.getElementById('eTitle').value.trim();
    const meta = document.getElementById('eMeta').value.trim();
    const description = document.getElementById('eDescription').value.trim();
    const orderRaw = document.getElementById('eOrder').value.trim();
    const order = orderRaw === '' || isNaN(Number(orderRaw)) ? 0 : Number(orderRaw);
    const docId = document.getElementById('eduDocId').value;

    if (!title){
      flash('eduMessage', 'Degree / title is required.', 'error');
      return;
    }

    const data = { title, meta, description, order };
    const promise = docId
      ? db.collection('education').doc(docId).update(data)
      : db.collection('education').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });

    promise
      .then(() => {
        flash('eduMessage', docId ? 'Education updated.' : 'Education added.', 'success');
        eduForm.classList.remove('open');
        resetEduForm();
      })
      .catch(err => flash('eduMessage', err.message, 'error'));
  });

  function editEducation(doc){
    const d = doc.data();
    document.getElementById('eduDocId').value = doc.id;
    document.getElementById('eTitle').value = d.title || '';
    document.getElementById('eMeta').value = d.meta || '';
    document.getElementById('eDescription').value = d.description || '';
    document.getElementById('eOrder').value = (d.order ?? 0);
    eduForm.classList.add('open');
    eduForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function deleteEducation(id, title){
    if (!confirm(`Delete "${title}"? This can't be undone.`)) return;
    db.collection('education').doc(id).delete()
      .then(() => flash('eduMessage', 'Education entry deleted.', 'success'))
      .catch(err => flash('eduMessage', err.message, 'error'));
  }

  function initEducation(){
    db.collection('education').orderBy('order', 'asc').onSnapshot(snapshot => {
      if (snapshot.empty){
        eduList.innerHTML = '<div class="empty-note">No education entries yet. Add your first one above.</div>';
        return;
      }
      eduList.innerHTML = '';
      snapshot.forEach(doc => {
        const d = doc.data();
        const row = document.createElement('div');
        row.className = 'project-row';
        row.innerHTML = `
          <div class="info">
            <span class="cat">${d.meta || ''}${d.order ? ' · ORDER ' + d.order : ''}</span>
            <h3>${d.title}</h3>
            <p>${d.description || ''}</p>
          </div>
          <div class="row-actions">
            <button class="btn" data-action="edit">Edit</button>
            <button class="btn btn-danger" data-action="delete">Delete</button>
          </div>`;
        row.querySelector('[data-action="edit"]').addEventListener('click', () => editEducation(doc));
        row.querySelector('[data-action="delete"]').addEventListener('click', () => deleteEducation(doc.id, d.title));
        eduList.appendChild(row);
      });
    }, err => {
      eduList.innerHTML = `<div class="empty-note">Couldn't load education: ${err.message}</div>`;
    });
  }

  /* ================= ABOUT ================= */
  const ABOUT_DEFAULTS = {
    paragraphs: [
      "I'm currently pursuing my B.Tech in Computer Science & Engineering, specializing in AI & Machine Learning, at Manipal Institute of Technology. My focus sits at the intersection of applied ML, clean software engineering, and building products people can actually use.",
      "Outside of coursework, I like exploring model architectures, contributing to small open-source tools, and refining the way I present technical work — like this page."
    ],
    stats: [
      { value: 'CSE', label: 'AI & ML BRANCH' },
      { value: 'MIT', label: 'MANIPAL' },
      { value: 'ML', label: 'CORE FOCUS' },
      { value: '∞', label: 'CURIOSITY' }
    ]
  };

  function initAbout(){
    db.doc('siteContent/about').get().then(snap => {
      const d = snap.exists ? snap.data() : ABOUT_DEFAULTS;
      const paragraphs = (d.paragraphs && d.paragraphs.length) ? d.paragraphs : ABOUT_DEFAULTS.paragraphs;
      const stats = (d.stats && d.stats.length === 4) ? d.stats : ABOUT_DEFAULTS.stats;
      document.getElementById('aP1').value = paragraphs[0] || '';
      document.getElementById('aP2').value = paragraphs[1] || '';
      stats.forEach((s, i) => {
        document.getElementById('aStatValue' + i).value = s.value || '';
        document.getElementById('aStatLabel' + i).value = s.label || '';
      });
    });
  }

  document.getElementById('saveAboutBtn').addEventListener('click', () => {
    const p1 = document.getElementById('aP1').value.trim();
    const p2 = document.getElementById('aP2').value.trim();
    if (!p1){
      flash('aboutMessage', 'Paragraph 1 is required.', 'error');
      return;
    }
    const stats = [0, 1, 2, 3].map(i => ({
      value: document.getElementById('aStatValue' + i).value.trim(),
      label: document.getElementById('aStatLabel' + i).value.trim()
    }));
    db.doc('siteContent/about').set({ paragraphs: [p1, p2], stats })
      .then(() => flash('aboutMessage', 'About updated.', 'success'))
      .catch(err => flash('aboutMessage', err.message, 'error'));
  });

  /* ================= SKILLS ================= */
  const SKILLS_DEFAULTS = [
    { name: 'Languages', chips: ['Python', 'C++', 'JavaScript', 'SQL', 'Java'] },
    { name: 'AI / ML', chips: ['TensorFlow', 'PyTorch', 'Scikit-learn', 'OpenCV', 'Pandas'] },
    { name: 'Tools', chips: ['Git', 'Docker', 'VS Code', 'Jupyter', 'Firebase'] }
  ];
  let skillsState = [];

  function escapeAttr(str){
    return String(str).replace(/"/g, '&quot;');
  }

  function renderSkillsCategories(){
    const container = document.getElementById('skillsCategories');
    container.innerHTML = '';
    skillsState.forEach((cat, i) => {
      const row = document.createElement('div');
      row.className = 'project-row';
      row.innerHTML = `
        <div class="info" style="width:100%;">
          <div class="form-row"><label>CATEGORY NAME</label><input type="text" class="catName" value="${escapeAttr(cat.name || '')}"></div>
          <div class="form-row" style="margin-bottom:0;"><label>CHIPS (comma separated)</label><input type="text" class="catChips" value="${escapeAttr((cat.chips || []).join(', '))}"></div>
        </div>
        <div class="row-actions"><button class="btn btn-danger" data-action="removeCat">Remove</button></div>`;
      row.querySelector('[data-action="removeCat"]').addEventListener('click', () => {
        skillsState.splice(i, 1);
        renderSkillsCategories();
      });
      container.appendChild(row);
    });
  }

  document.getElementById('addSkillCatBtn').addEventListener('click', () => {
    skillsState.push({ name: '', chips: [] });
    renderSkillsCategories();
  });

  function initSkills(){
    db.doc('siteContent/skills').get().then(snap => {
      skillsState = (snap.exists && snap.data().categories && snap.data().categories.length)
        ? snap.data().categories
        : JSON.parse(JSON.stringify(SKILLS_DEFAULTS));
      renderSkillsCategories();
    });
  }

  document.getElementById('saveSkillsBtn').addEventListener('click', () => {
    const rows = document.querySelectorAll('#skillsCategories .project-row');
    const categories = Array.from(rows).map(row => ({
      name: row.querySelector('.catName').value.trim(),
      chips: row.querySelector('.catChips').value.split(',').map(s => s.trim()).filter(Boolean)
    })).filter(c => c.name);

    if (!categories.length){
      flash('skillsMessage', 'Add at least one category with a name.', 'error');
      return;
    }
    db.doc('siteContent/skills').set({ categories })
      .then(() => { skillsState = categories; flash('skillsMessage', 'Skills updated.', 'success'); })
      .catch(err => flash('skillsMessage', err.message, 'error'));
  });

  /* ================= EXPERIENCE ================= */
  const expForm = document.getElementById('expForm');
  const expList = document.getElementById('expList');

  function resetExpForm(){
    document.getElementById('expDocId').value = '';
    document.getElementById('xMeta').value = '';
    document.getElementById('xTitle').value = '';
    document.getElementById('xDescription').value = '';
  }

  document.getElementById('newExpBtn').addEventListener('click', () => {
    resetExpForm();
    expForm.classList.add('open');
    expForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
  document.getElementById('cancelExpBtn').addEventListener('click', () => {
    expForm.classList.remove('open');
  });

  document.getElementById('saveExpBtn').addEventListener('click', () => {
    const meta = document.getElementById('xMeta').value.trim();
    const title = document.getElementById('xTitle').value.trim();
    const description = document.getElementById('xDescription').value.trim();
    const docId = document.getElementById('expDocId').value;

    if (!title || !description){
      flash('expMessage', 'Title and description are required.', 'error');
      return;
    }

    const data = { meta, title, description };
    const promise = docId
      ? db.collection('experience').doc(docId).update(data)
      : db.collection('experience').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });

    promise
      .then(() => {
        flash('expMessage', docId ? 'Experience updated.' : 'Experience added.', 'success');
        expForm.classList.remove('open');
        resetExpForm();
      })
      .catch(err => flash('expMessage', err.message, 'error'));
  });

  function editExperience(doc){
    const d = doc.data();
    document.getElementById('expDocId').value = doc.id;
    document.getElementById('xMeta').value = d.meta || '';
    document.getElementById('xTitle').value = d.title || '';
    document.getElementById('xDescription').value = d.description || '';
    expForm.classList.add('open');
    expForm.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function deleteExperience(id, title){
    if (!confirm(`Delete "${title}"? This can't be undone.`)) return;
    db.collection('experience').doc(id).delete()
      .then(() => flash('expMessage', 'Experience deleted.', 'success'))
      .catch(err => flash('expMessage', err.message, 'error'));
  }

  function initExperience(){
    db.collection('experience').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
      if (snapshot.empty){
        expList.innerHTML = '<div class="empty-note">No experience entries yet. Add your first one above.</div>';
        return;
      }
      expList.innerHTML = '';
      snapshot.forEach(doc => {
        const d = doc.data();
        const row = document.createElement('div');
        row.className = 'project-row';
        row.innerHTML = `
          <div class="info">
            <span class="cat">${d.meta || ''}</span>
            <h3>${d.title}</h3>
            <p>${d.description || ''}</p>
          </div>
          <div class="row-actions">
            <button class="btn" data-action="edit">Edit</button>
            <button class="btn btn-danger" data-action="delete">Delete</button>
          </div>`;
        row.querySelector('[data-action="edit"]').addEventListener('click', () => editExperience(doc));
        row.querySelector('[data-action="delete"]').addEventListener('click', () => deleteExperience(doc.id, d.title));
        expList.appendChild(row);
      });
    }, err => {
      expList.innerHTML = `<div class="empty-note">Couldn't load experience: ${err.message}</div>`;
    });
  }
</script>
</body>
</html>
